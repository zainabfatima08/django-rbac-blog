<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if object %}Update Post{% else %}Create Post{% endif %}</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">

<div class="w-full max-w-2xl bg-white rounded-2xl shadow-lg p-8">

    <div class="mb-6 text-center">
        <h2 class="text-3xl font-bold text-gray-800">
            {% if object %}Update Post{% else %}Create New Post{% endif %}
        </h2>
        <p class="text-gray-500 text-sm mt-1">
            Idhar New Post Create karo!
        </p>
    </div>

    <form method="POST" class="space-y-6">
        {% csrf_token %}

        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">
                Topic
            </label>
            {{ form.topic }}
        </div>

        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">
                Article
            </label>
            {{ form.article }}
        </div>

        <div class="flex justify-between items-center pt-4">

            <a href="{% url 'post_list' %}"
               class="text-gray-600 hover:text-gray-800 text-sm">
                ← Back to Posts
            </a>

            <button type="submit"
                class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg shadow-md transition duration-200">
                {% if object %}Update Post{% else %}Create Post{% endif %}
            </button>

        </div>

    </form>

</div>

</body>
</html>
